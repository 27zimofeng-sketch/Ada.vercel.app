<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Feng | Chemistry & Code</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">ADA.FENG ✨</div>
        <ul class="nav-links">
            <li><a href="#about">Bio</a></li>
            <li><a href="#projects">Lab Room</a></li>
            <li><a href="#resources">Library</a></li>
            <li><a href="#games">Fun Zone</a></li>
        </ul>
    </nav>

    <header id="about" class="header">
        <div class="header-content">
            <div class="profile-wrapper">
                <img src="your-photo.jpg" alt="Ada Feng" class="profile-pic">
                <div class="bubble">Hi! ☁️</div>
            </div>
            <h1>I'm <span class="highlight">Ada Feng</span></h1>
            <p>Student @ <b>Forest City International School</b></p>
            <p class="sub-bio">Mixing <b>Chemistry</b> 🧪 with <b>Pure Code</b> 💻 to create something reactive!</p>
        </div>
    </header>

    <section id="projects" class="section">
        <h2>My Project Lab</h2>
        <div id="project-list" class="grid"></div>
    </section>

    <section id="resources" class="section bg-soft-blue">
        <h2>Resource Dropbox</h2>
        <div class="upload-container">
            <input type="file" id="fileInput">
            <button onclick="uploadFile()" class="btn">Add to Collection</button>
            <ul id="fileList"></ul>
        </div>
    </section>

    <section id="games" class="section">
        <h2>Mini Game Break</h2>
        <div class="game-area">
            <p>High Score: <span id="high-score">0</span></p>
            <div id="game-target" onclick="scorePoint()">✨</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
